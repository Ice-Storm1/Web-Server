<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clienti</title>
  <link rel="stylesheet" href="assets/css/dashboard.css">
</head>
<body>
  <div class="dashboard">
    <aside class="sidebar">
      <div class="sidebar-logo">
        <div class="sidebar-logo-icon" id="logoIcon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="3"></circle>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
          </svg>
        </div>
        <span class="sidebar-logo-text">DevBridge</span>
      </div>

      <ul class="nav-menu">
        <li class="nav-item">
          <a href="dashboard.html" class="nav-link" data-page="dashboard">
            <span class="nav-icon">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="3" y="3" width="7" height="7"></rect>
                <rect x="14" y="3" width="7" height="7"></rect>
                <rect x="14" y="14" width="7" height="7"></rect>
                <rect x="3" y="14" width="7" height="7"></rect>
              </svg>
            </span>
            Dashboard
          </a>
        </li>
        <li class="nav-item">
          <a href="clienti.html" class="nav-link active" data-page="clienti">
            <span class="nav-icon">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                <circle cx="9" cy="7" r="4"></circle>
                <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
                <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
              </svg>
            </span>
            Clienti
          </a>
        </li>
        <li class="nav-item">
          <a href="ticket.html" class="nav-link" data-page="ticket">
            <span class="nav-icon">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                <polyline points="14 2 14 8 20 8"></polyline>
                <line x1="16" y1="13" x2="8" y2="13"></line>
                <line x1="16" y1="17" x2="8" y2="17"></line>
              </svg>
            </span>
            Ticket
          </a>
        </li>
        <li class="nav-item">
          <a href="stats.html" class="nav-link" data-page="stats">
            <span class="nav-icon">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="18" y1="20" x2="18" y2="10"></line>
                <line x1="12" y1="20" x2="12" y2="4"></line>
                <line x1="6" y1="20" x2="6" y2="14"></line>
              </svg>
            </span>
            Statistiche
          </a>
        </li>
        <li class="nav-item" id="adminPanelLink" style="display: none;">
          <a href="admin.html" class="nav-link" data-page="admin">
            <span class="nav-icon">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="3"></circle>
                <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
              </svg>
            </span>
            Admin
          </a>
        </li>
      </ul>

      <div class="sidebar-footer">
        <div class="user-profile" onclick="openSettings()">
          <div class="user-avatar">AM</div>
          <div class="user-info">
            <div class="user-name" id="userNameDisplay">Caricamento...</div>
            <div class="user-role" id="userRole">Admin</div>
          </div>
        </div>
        <button class="logout-btn" onclick="logout()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
            <polyline points="16 17 21 12 16 7"></polyline>
            <line x1="21" y1="12" x2="9" y2="12"></line>
          </svg>
        </button>
      </div>
    </aside>

    <main class="main-content">
      <div class="page-header">
        <h1 class="page-title">Clienti</h1>
        <button class="btn-add" id="addClientBtn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="12" y1="5" x2="12" y2="19"></line>
            <line x1="5" y1="12" x2="19" y2="12"></line>
          </svg>
          Nuovo Cliente
        </button>
      </div>

      <div class="card">
        <div class="table-container">
          <table>
            <thead>
              <tr>
                <th>Cliente</th>
                <th>Stato</th>
                <th>Azione</th>
              </tr>
            </thead>
            <tbody id="clientsTableBody">
            </tbody>
          </table>
        </div>
      </div>
    </main>
  </div>

  <div class="modal" id="clientModal">
    <div class="modal-content">
      <div class="modal-header">
        <h3 id="modalTitle">Nuovo Cliente</h3>
        <button class="modal-close" id="closeModal">×</button>
      </div>
      <form id="clientForm">
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Nome & Cognome</label>
            <input type="text" class="form-input" id="clientName" required>
          </div>
          <div class="form-group">
            <label class="form-label">Azienda</label>
            <input type="text" class="form-input" id="clientCompany">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Email</label>
            <input type="email" class="form-input" id="clientEmail" required>
          </div>
          <div class="form-group">
            <label class="form-label">Telefono</label>
            <input type="tel" class="form-input" id="clientPhone" placeholder="+39 ...">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Lavoro</label>
            <input type="text" class="form-input" id="clientJob" placeholder="Es. Grafico, Sviluppatore, Manager...">
          </div>
          <div class="form-group">
            <label class="form-label">Categoria Problema</label>
            <select class="form-input" id="clientCategory" onchange="updateErrorTypes()">
              <option value="">Seleziona categoria...</option>
              <option value="Hardware">Hardware</option>
              <option value="Software">Software</option>
              <option value="Rete">Rete</option>
              <option value="Sicurezza">Sicurezza</option>
              <option value="Email">Email</option>
              <option value="Account">Account</option>
              <option value="Stampa">Stampa</option>
              <option value="Altro">Altro</option>
            </select>
          </div>
        </div>
        <div class="form-group" id="errorTypeGroup" style="display: none;">
          <label class="form-label">Tipo Problema</label>
          <select class="form-input" id="clientErrorType">
            <option value="">Seleziona...</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Problema</label>
          <textarea class="form-input" id="clientProblem" rows="3" placeholder="Descrivi il problema..."></textarea>
        </div>
        <div class="form-group">
          <label class="form-label">Stato</label>
          <select class="form-input" id="clientStatus">
            <option value="active">Attivo</option>
            <option value="pending">In Attesa</option>
            <option value="inactive">Inattivo</option>
          </select>
        </div>
        <div class="modal-actions">
          <button type="button" class="btn-cancel" id="cancelBtn">Annulla</button>
          <button type="submit" class="btn-save">Salva</button>
        </div>
      </form>
    </div>
  </div>

  <div class="modal" id="settingsModal">
    <div class="modal-content settings-modal">
      <div class="modal-header">
        <h3>Impostazioni</h3>
        <button class="modal-close" id="closeSettings">×</button>
      </div>
      <div class="settings-content">
        <div class="form-group">
          <label class="form-label">Tema</label>
          <select class="form-input" id="settingTheme">
            <option value="dark">Scuro</option>
            <option value="light">Chiaro</option>
          </select>
        </div>
        <button class="btn-primary" id="saveSettingsBtn">Salva Impostazioni</button>
        <hr style="border: none; border-top: 1px solid var(--border); margin: 16px 0;">
        <div class="form-group">
          <label class="form-label">Cambia Password</label>
          <input type="password" class="form-input" id="settingOldPassword" placeholder="Password attuale" style="margin-bottom: 8px;">
          <input type="password" class="form-input" id="settingNewPassword" placeholder="Nuova password">
        </div>
        <button class="btn-primary" onclick="changePassword()" style="margin-bottom: 12px;">Aggiorna Password</button>
        <hr style="border: none; border-top: 1px solid var(--border); margin: 20px 0;">
        <button class="btn-danger" onclick="deleteAccount()" style="width: 100%;">Elimina Account</button>
      </div>
    </div>
  </div>

  <!-- Custom Confirm Modal -->
  <div class="modal" id="confirmModal" style="display: none;">
    <div class="modal-content" style="max-width: 400px; text-align: center;">
      <div class="modal-header">
        <h3 id="confirmTitle">Conferma</h3>
      </div>
      <div style="padding: 20px;">
        <p id="confirmMessage" style="margin-bottom: 24px; color: var(--text);">Sei sicuro?</p>
        <div style="display: flex; gap: 12px; justify-content: center;">
          <button class="btn-cancel" id="confirmCancel" style="padding: 10px 24px;">Annulla</button>
          <button class="btn-danger" id="confirmOk" style="padding: 10px 24px;">Conferma</button>
        </div>
      </div>
    </div>
  </div>

  <script src="assets/js/config.js"></script>
  <script src="assets/js/clienti.js"></script>
</body>
</html>
