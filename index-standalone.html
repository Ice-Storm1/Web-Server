<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Annotazioni</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a1a;
            color: #e0e0e0;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            margin-bottom: 20px;
        }

        .filters {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }

        .search-box {
            flex: 2;
            min-width: 150px;
        }

        .filter-select {
            flex: 1;
            min-width: 100px;
        }

        .sort-select {
            flex: 1;
            min-width: 100px;
        }

        input, select {
            padding: 10px;
            border: 1px solid #333;
            border-radius: 4px;
            font-size: 14px;
            background: #2a2a2a;
            color: #e0e0e0;
        }

        input::placeholder {
            color: #666;
        }

        form {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        input[type="date"] { flex: 1; }
        select { flex: 1; }
        input[type="text"] { flex: 2; }

        button {
            padding: 10px 20px;
            background: #4a4a4a;
            color: #e0e0e0;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }

        button:hover {
            background: #5a5a5a;
        }

        .tags-input {
            width: 100%;
            margin-top: 10px;
        }

        .tag {
            display: inline-block;
            background: #3a3a3a;
            padding: 3px 8px;
            border-radius: 12px;
            font-size: 12px;
            margin-right: 5px;
            margin-bottom: 5px;
        }

        .annotation {
            background: #2a2a2a;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 4px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            border-left: 4px solid #555;
        }

        .annotation.alta { border-left-color: #e74c3c; }
        .annotation.media { border-left-color: #f39c12; }
        .annotation.bassa { border-left-color: #27ae60; }

        .annotation-content { flex: 1; cursor: pointer; }

        .annotation-date {
            font-size: 12px;
            color: #888;
            margin-bottom: 4px;
        }

        .annotation-tags {
            margin-top: 5px;
        }

        .annotation-actions {
            display: flex;
            flex-direction: column;
            gap: 2px;
            margin-left: 10px;
        }

        .annotation-edit, .annotation-delete {
            background: none;
            border: none;
            color: #666;
            cursor: pointer;
            font-size: 18px;
            padding: 5px 10px;
        }

        .annotation-edit:hover { color: #3498db; }
        .annotation-delete:hover { color: #e74c3c; }

        .empty-state {
            text-align: center;
            color: #666;
            padding: 40px;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
        }

        .modal-content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #2a2a2a;
            padding: 20px;
            border-radius: 8px;
            max-width: 400px;
            width: 90%;
        }

        .modal-close {
            position: absolute;
            right: 15px;
            top: 10px;
            font-size: 24px;
            cursor: pointer;
            color: #888;
        }

        .modal-close:hover { color: #e0e0e0; }

        #modalTitle { margin-bottom: 10px; }
        #modalDesc { color: #ccc; line-height: 1.5; margin-bottom: 10px; }
        #modalTags { margin-top: 10px; }

        footer {
            text-align: center;
            margin-top: 30px;
            padding: 15px;
            color: #666;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Annotazioni</h1>
        
        <div class="filters">
            <input type="text" id="search" class="search-box" placeholder="Cerca...">
            <select id="filterPriority" class="filter-select">
                <option value="">Tutte le priorità</option>
                <option value="alta">Alta</option>
                <option value="media">Media</option>
                <option value="bassa">Bassa</option>
            </select>
            <select id="filterTag" class="filter-select">
                <option value="">Tutti i tag</option>
            </select>
            <select id="sortBy" class="sort-select">
                <option value="date-desc">Data ↓</option>
                <option value="date-asc">Data ↑</option>
                <option value="priority">Priorità</option>
            </select>
        </div>
        
        <form id="annotationForm">
            <input type="hidden" id="editId">
            <input type="date" id="date" required>
            <select id="priority" required>
                <option value="">Priorità</option>
                <option value="alta">Alta</option>
                <option value="media">Media</option>
                <option value="bassa">Bassa</option>
            </select>
            <input type="text" id="description" placeholder="Descrizione..." required>
            <button type="submit" id="submitBtn">Aggiungi</button>
            <input type="text" id="tags" class="tags-input" placeholder="Tag (separati da virgola)">
        </form>
        
        <div id="annotationsList"></div>
        
        <footer>
            <p>Creato da <strong>IceStorm</strong> &copy; 2026 - Tutti i diritti riservati</p>
        </footer>
    </div>

    <div id="modal" class="modal">
        <div class="modal-content">
            <span class="modal-close">&times;</span>
            <h2 id="modalTitle"></h2>
            <p id="modalDesc"></p>
            <div id="modalTags"></div>
        </div>
    </div>

    <script>
        const form = document.getElementById('annotationForm');
        const list = document.getElementById('annotationsList');
        const modal = document.getElementById('modal');
        const modalClose = document.querySelector('.modal-close');
        const submitBtn = document.getElementById('submitBtn');
        const searchInput = document.getElementById('search');
        const filterPriority = document.getElementById('filterPriority');
        const filterTag = document.getElementById('filterTag');
        const sortBy = document.getElementById('sortBy');

        let editMode = false;
        let allAnnotations = [];

        document.getElementById('date').valueAsDate = new Date();

        function loadAnnotations() {
            allAnnotations = JSON.parse(localStorage.getItem('annotations') || '[]');
            updateTagFilter();
            applyFilters();
        }

        function saveAnnotations() {
            localStorage.setItem('annotations', JSON.stringify(allAnnotations));
        }

        function updateTagFilter() {
            const tags = new Set();
            allAnnotations.forEach(a => {
                if (a.tags) a.tags.forEach(t => tags.add(t));
            });
            
            const currentValue = filterTag.value;
            filterTag.innerHTML = '<option value="">Tutti i tag</option>';
            tags.forEach(t => {
                filterTag.innerHTML += `<option value="${t}">${t}</option>`;
            });
            filterTag.value = currentValue;
        }

        function applyFilters() {
            let filtered = [...allAnnotations];
            
            const search = searchInput.value.toLowerCase();
            if (search) {
                filtered = filtered.filter(a => 
                    a.description.toLowerCase().includes(search) ||
                    (a.tags && a.tags.some(t => t.toLowerCase().includes(search)))
                );
            }
            
            if (filterPriority.value) {
                filtered = filtered.filter(a => a.priority === filterPriority.value);
            }
            
            if (filterTag.value) {
                filtered = filtered.filter(a => a.tags && a.tags.includes(filterTag.value));
            }
            
            const sort = sortBy.value;
            if (sort === 'date-desc') {
                filtered.sort((a, b) => new Date(b.date) - new Date(a.date));
            } else if (sort === 'date-asc') {
                filtered.sort((a, b) => new Date(a.date) - new Date(b.date));
            } else if (sort === 'priority') {
                const priorityOrder = { alta: 0, media: 1, bassa: 2 };
                filtered.sort((a, b) => priorityOrder[a.priority] - priorityOrder[b.priority]);
            }
            
            renderAnnotations(filtered);
        }

        function renderAnnotations(annotations) {
            if (annotations.length === 0) {
                list.innerHTML = '<div class="empty-state">Nessuna annotazione trovata</div>';
                return;
            }
            
            list.innerHTML = annotations.map(a => `
                <div class="annotation ${a.priority}">
                    <div class="annotation-content" onclick="showModal('${a.date}', '${a.priority}', '${a.description.replace(/'/g, "\\'")}', '${(a.tags || []).join(',')}')">
                        <div class="annotation-date">${a.date}</div>
                        <div class="annotation-desc">${a.description}</div>
                        ${a.tags ? `<div class="annotation-tags">${a.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>` : ''}
                    </div>
                    <div class="annotation-actions">
                        <button class="annotation-edit" onclick="editAnnotation(${a.id}, '${a.date}', '${a.priority}', '${a.description.replace(/'/g, "\\'")}', '${(a.tags || []).join(',')}')">✎</button>
                        <button class="annotation-delete" onclick="deleteAnnotation(${a.id})">×</button>
                    </div>
                </div>
            `).join('');
        }

        form.addEventListener('submit', (e) => {
            e.preventDefault();
            
            const date = document.getElementById('date').value;
            const priority = document.getElementById('priority').value;
            const description = document.getElementById('description').value;
            const tagsInput = document.getElementById('tags').value;
            const tags = tagsInput ? tagsInput.split(',').map(t => t.trim()).filter(t => t) : [];
            
            if (editMode) {
                const editId = document.getElementById('editId').value;
                const idx = allAnnotations.findIndex(a => a.id == editId);
                if (idx !== -1) {
                    allAnnotations[idx] = { ...allAnnotations[idx], date, priority, description, tags };
                }
                cancelEdit();
            } else {
                allAnnotations.push({
                    id: Date.now(),
                    date,
                    priority,
                    description,
                    tags
                });
            }
            
            saveAnnotations();
            document.getElementById('date').valueAsDate = new Date();
            loadAnnotations();
        });

        function deleteAnnotation(id) {
            allAnnotations = allAnnotations.filter(a => a.id !== id);
            saveAnnotations();
            loadAnnotations();
        }

        function editAnnotation(id, date, priority, desc, tags) {
            editMode = true;
            document.getElementById('editId').value = id;
            document.getElementById('date').value = date;
            document.getElementById('priority').value = priority;
            document.getElementById('description').value = desc;
            document.getElementById('tags').value = tags;
            submitBtn.textContent = 'Modifica';
        }

        function cancelEdit() {
            editMode = false;
            document.getElementById('editId').value = '';
            form.reset();
            document.getElementById('date').valueAsDate = new Date();
            submitBtn.textContent = 'Aggiungi';
        }

        function showModal(date, priority, desc, tags) {
            document.getElementById('modalTitle').textContent = `${date} - ${priority.charAt(0).toUpperCase() + priority.slice(1)}`;
            document.getElementById('modalDesc').textContent = desc;
            document.getElementById('modalTags').innerHTML = tags ? tags.split(',').map(t => `<span class="tag">${t.trim()}</span>`).join('') : '';
            modal.style.display = 'block';
        }

        modalClose.addEventListener('click', () => modal.style.display = 'none');
        modal.addEventListener('click', (e) => { if (e.target === modal) modal.style.display = 'none'; });

        searchInput.addEventListener('input', applyFilters);
        filterPriority.addEventListener('change', applyFilters);
        filterTag.addEventListener('change', applyFilters);
        sortBy.addEventListener('change', applyFilters);

        loadAnnotations();
    </script>
</body>
</html>
