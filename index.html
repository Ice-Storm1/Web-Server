<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Annotazioni</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Annotazioni</h1>
        
        <div class="filters">
            <button id="deleteAllBtn" style="background: #e74c3c; color: white;">Delete All</button>
            <input type="text" id="search" class="search-box" placeholder="Cerca...">
            <select id="filterPriority" class="filter-select">
                <option value="">Tutte le priorità</option>
                <option value="alta">Alta</option>
                <option value="media">Media</option>
                <option value="bassa">Bassa</option>
            </select>
            <select id="filterTag" class="filter-select">
                <option value="">Tutti i tag</option>
            </select>
            <select id="sortBy" class="sort-select">
                <option value="date-desc">Data ↓</option>
                <option value="date-asc">Data ↑</option>
                <option value="priority">Priorità</option>
            </select>
        </div>
        
        <form id="annotationForm">
            <input type="hidden" id="editId">
            <input type="date" id="date" required>
            <select id="priority" required>
                <option value="">Priorità</option>
                <option value="alta">Alta</option>
                <option value="media">Media</option>
                <option value="bassa">Bassa</option>
            </select>
            <input type="text" id="description" placeholder="Descrizione..." required>
            <button type="submit" id="submitBtn">Aggiungi</button>
            <input type="text" id="tags" class="tags-input" placeholder="Tag (separati da virgola)">
        </form>
        
        <div id="annotationsList"></div>
        
        <footer>
            <p>Creato da <strong>IceStorm</strong> &copy; 2026 - Tutti i diritti riservati</p>
        </footer>
    </div>

    <div id="modal" class="modal">
        <div class="modal-content">
            <span class="modal-close">&times;</span>
            <h2 id="modalTitle"></h2>
            <p id="modalDesc"></p>
            <div id="modalTags"></div>
        </div>
    </div>

    <div id="tagModal" class="modal">
        <div class="modal-content">
            <span class="modal-close">&times;</span>
            <h2>Aggiungi Tag</h2>
            <input type="text" id="tagInput" placeholder="Inserisci tag...">
            <button onclick="addTag()">Aggiungi</button>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
