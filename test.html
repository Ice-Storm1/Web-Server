<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Annotazioni</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .test-result { margin: 10px 0; padding: 10px; border-radius: 5px; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        .info { background: #cce7ff; color: #004085; }
    </style>
</head>
<body>
    <h1>Test Funzionalità</h1>
    <div id="testResults"></div>
    
    <script>
        function addTest(message, result) {
            const div = document.createElement('div');
            div.className = `test-result ${result}`;
            div.textContent = message;
            document.getElementById('testResults').appendChild(div);
        }
        
        async function runTests() {
            addTest('Avvio test...', 'info');
            
            // Test 1: Verifica connessione
            try {
                const res = await fetch('/api/annotations');
                if (res.ok) {
                    addTest('✓ API accessibile', 'success');
                } else {
                    addTest('✗ API non accessibile', 'error');
                }
            } catch (err) {
                addTest('✗ Errore connessione: ' + err.message, 'error');
            }
            
            // Test 2: Verifica creazione annotazione
            try {
                const testAnnotation = {
                    date: '2026-03-01',
                    priority: 'media',
                    description: 'Test annotazione',
                    tags: 'test,prova'
                };
                
                const res = await fetch('/api/annotations', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(testAnnotation)
                });
                
                if (res.ok) {
                    const result = await res.json();
                    addTest('✓ Annotazione creata con ID: ' + result.id, 'success');
                    
                    // Test 3: Verifica lettura
                    const readRes = await fetch('/api/annotations');
                    const annotations = await readRes.json();
                    addTest('✓ Letto ' + annotations.length + ' annotazioni', 'success');
                } else {
                    addTest('✗ Errore creazione annotazione', 'error');
                }
            } catch (err) {
                addTest('✗ Errore test creazione: ' + err.message, 'error');
            }
            
            addTest('Test completati!', 'info');
        }
        
        runTests();
    </script>
</body>
</html>
