<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ticket</title>
  <link rel="stylesheet" href="assets/css/dashboard.css">
</head>
<body>
  <div class="dashboard">
    <aside class="sidebar">
      <div class="sidebar-logo">
        <div class="sidebar-logo-icon" id="logoIcon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
        </div>
        <span class="sidebar-logo-text">DevBridge</span>
      </div>
      <ul class="nav-menu">
        <li class="nav-item"><a href="dashboard.html" class="nav-link" data-page="dashboard"><span class="nav-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg></span>Dashboard</a></li>
        <li class="nav-item" id="clientiLink"><a href="clienti.html" class="nav-link" data-page="clienti"><span class="nav-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle></svg></span>Clienti</a></li>
        <li class="nav-item"><a href="ticket.html" class="nav-link active" data-page="ticket"><span class="nav-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline></svg></span>Ticket</a></li>
        <li class="nav-item"><a href="stats.html" class="nav-link" data-page="stats"><span class="nav-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"></line><line x1="12" y1="20" x2="12" y2="4"></line><line x1="6" y1="20" x2="6" y2="14"></line></svg></span>Statistiche</a></li>
        <li class="nav-item" id="adminPanelLink" style="display: none;"><a href="admin.html" class="nav-link" data-page="admin"><span class="nav-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg></span>Admin</a></li>
      </ul>
      <div class="sidebar-footer">
        <div class="user-profile" onclick="openSettings()">
          <div class="user-avatar">AM</div>
          <div class="user-info"><div class="user-name" id="userNameDisplay">Caricamento...</div><div class="user-role" id="userRole">Admin</div></div>
        </div>
        <button class="logout-btn" onclick="logout()"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg></button>
      </div>
    </aside>

    <main class="main-content">
      <div class="page-header">
        <h1 class="page-title">Ticket</h1>
        <div class="header-actions">
          <div class="search-box">
            <span class="search-icon"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg></span>
            <input type="text" placeholder="Cerca per ID..." id="searchInput">
          </div>
        </div>
      </div>

      <div class="card" style="margin-top: 16px;">
        <div class="card-header" style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; padding: 12px 16px; background: var(--surface); border-bottom: 1px solid var(--border);">
          <div class="filter-box">
            <select id="filterStatus" class="filter-select">
              <option value="all">Stato: Tutti</option>
              <option value="open">Stato: Aperti</option>
              <option value="in_progress">Stato: In Lavoraz.</option>
              <option value="waiting">Stato: In Attesa</option>
              <option value="closed">Stato: Chiusi</option>
            </select>
            <select id="filterPriority" class="filter-select">
              <option value="">Urgenza</option>
              <option value="low">🔵 Basso</option>
              <option value="medium">🟡 Medio</option>
              <option value="high">🟠 Alto</option>
              <option value="urgent">🔴 Urgente</option>
            </select>
            <input type="date" id="filterDate" class="filter-date">
            <button onclick="clearFilters()" class="filter-reset">Reset</button>
          </div>
          <button class="btn-add" id="newTicketBtn">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
            Nuovo Ticket
          </button>
        </div>
        <div id="ticketsCardsContainer" class="ticket-cards-grid"></div>
      </div>
    </main>
  </div>

  <!-- Ticket Modal -->
  <div class="modal" id="ticketModal">
    <div class="modal-content">
      <div class="modal-header">
        <h3 id="ticketModalTitle">Nuovo Ticket</h3>
        <button class="modal-close" id="closeTicketModal">×</button>
      </div>
      <form id="ticketForm">
        <div class="form-group">
          <label class="form-label">Problema</label>
          <textarea class="form-input" id="ticketProblem" rows="3" placeholder="Descrivi il problema..." required></textarea>
        </div>
        <div class="form-group">
          <label class="form-label">Categoria</label>
          <select class="form-input" id="ticketCategory">
            <option value="">Seleziona...</option>
            <option value="Hardware">Hardware</option>
            <option value="Software">Software</option>
            <option value="Rete">Rete</option>
            <option value="Sicurezza">Sicurezza</option>
            <option value="Account">Account</option>
            <option value="Stampa">Stampa</option>
            <option value="Altro">Altro</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Priorità</label>
          <select class="form-input" id="ticketPriority">
            <option value="low">Bassa</option>
            <option value="medium" selected>Media</option>
            <option value="high">Alta</option>
            <option value="urgent">Urgente</option>
          </select>
        </div>
        <div class="modal-actions">
          <button type="button" class="btn-cancel" id="cancelTicketBtn">Annulla</button>
          <button type="submit" class="btn-save">Invia Ticket</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Ticket Edit Modal -->
  <div class="ticket-modal-overlay" id="ticketEditModal">
    <div class="ticket-modal-card">
      <div class="ticket-modal-header">
        <h2>Modifica Ticket #<span id="editTicketId"></span></h2>
        <button class="ticket-modal-close" onclick="closeTicketEdit()">×</button>
      </div>
      <div class="ticket-modal-body">
        <input type="hidden" id="editTicketIdInput">
        <div class="form-group">
          <label class="form-label">Cliente</label>
          <input type="text" class="form-input" id="editTicketClient" readonly>
        </div>
        <div class="form-group">
          <label class="form-label">Stato</label>
          <div class="ticket-edit-status" id="editStatusButtons">
            <button type="button" data-status="open" onclick="setEditStatus('open')">Aperto</button>
            <button type="button" data-status="in_progress" onclick="setEditStatus('in_progress')">In Lavorazione</button>
            <button type="button" data-status="waiting" onclick="setEditStatus('waiting')">In Attesa</button>
            <button type="button" data-status="closed" onclick="setEditStatus('closed')">Chiuso</button>
          </div>
          <div id="closeWarning" style="display: none; color: #ef4444; font-size: 12px; margin-top: 6px;">* Il ticket verrà eliminato</div>
        </div>
        <div class="form-group">
          <label class="form-label">Priorità</label>
          <select class="form-input" id="editTicketPriority">
            <option value="low">Bassa</option>
            <option value="medium">Media</option>
            <option value="high">Alta</option>
            <option value="urgent">Urgente</option>
          </select>
        </div>
      </div>
      <div class="ticket-modal-footer">
        <button type="button" class="btn-cancel" onclick="closeTicketEdit()">Annulla</button>
        <button type="button" class="btn-save" onclick="saveTicketEdit()">Salva Modifiche</button>
      </div>
    </div>
  </div>
</div>

  <!-- Chat Modal -->
  <div class="modal" id="chatModal">
    <div class="modal-content chat-modal">
      <div class="modal-header">
        <h3 id="chatTitle">Chat</h3>
        <button class="modal-close" onclick="closeChat()">×</button>
      </div>
      <div class="chat-messages" id="chatMessages"></div>
      <div class="chat-input">
        <input type="text" id="chatInput" placeholder="Scrivi un messaggio...">
        <button onclick="sendMessage()"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg></button>
      </div>
    </div>
  </div>

  <div class="modal" id="settingsModal">
    <div class="modal-content settings-modal">
      <div class="modal-header">
        <h3>Impostazioni</h3>
        <button class="modal-close" onclick="closeSettings()">×</button>
      </div>
      <div class="settings-content">
        <div class="form-group">
          <label class="form-label">Tema</label>
          <select class="form-input" id="settingTheme">
            <option value="dark">Scuro</option>
            <option value="light">Chiaro</option>
          </select>
        </div>
        <button class="btn-primary" onclick="saveSettings()">Salva Impostazioni</button>
        <hr style="border: none; border-top: 1px solid var(--border); margin: 16px 0;">
        <div class="form-group">
          <label class="form-label">Cambia Password</label>
          <input type="password" class="form-input" id="settingOldPassword" placeholder="Password attuale" style="margin-bottom: 8px;">
          <input type="password" class="form-input" id="settingNewPassword" placeholder="Nuova password">
        </div>
        <button class="btn-primary" onclick="changePassword()" style="margin-bottom: 12px;">Aggiorna Password</button>
        <hr style="border: none; border-top: 1px solid var(--border); margin: 16px 0;">
        <button class="btn-danger" onclick="deleteAccount()" style="width: 100%;">Elimina Account</button>
      </div>
    </div>
  </div>

  <div class="cookie-banner hidden" id="cookieBanner">
    <p>Questo sito utilizza i cookie per migliorare la tua esperienza.</p>
    <div class="cookie-actions">
      <button class="cookie-btn-settings" onclick="cookieSettings()">Personalizza</button>
      <button class="cookie-btn-reject" onclick="rejectCookies()">Rifiuta</button>
      <button class="cookie-btn-accept" onclick="acceptCookies()">Accetta</button>
    </div>
  </div>

  <!-- Custom Confirm Modal -->
  <div class="modal" id="confirmModal" style="display: none;">
    <div class="modal-content" style="max-width: 400px; text-align: center;">
      <div class="modal-header">
        <h3 id="confirmTitle">Conferma</h3>
      </div>
      <div style="padding: 20px;">
        <p id="confirmMessage" style="margin-bottom: 24px; color: var(--text);">Sei sicuro?</p>
        <div style="display: flex; gap: 12px; justify-content: center;">
          <button class="btn-cancel" id="confirmCancel" style="padding: 10px 24px;">Annulla</button>
          <button class="btn-danger" id="confirmOk" style="padding: 10px 24px;">Conferma</button>
        </div>
      </div>
    </div>
  </div>

  <script src="assets/js/config.js"></script>
  <script src="assets/js/ticket.js"></script>
</body>
</html>
